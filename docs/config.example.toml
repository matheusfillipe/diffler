# diffler configuration. Every key is optional; values shown are the defaults.
#
# Layering, later wins per key:
#   1. built-in defaults
#   2. ~/.config/diffler/config.toml ($XDG_CONFIG_HOME respected, macOS included)
#   3. <repo>/.diffler/config.toml
#   4. CLI flags (--port, --no-mcp, --theme)
#
# Inspect the merged result and the origin of each value:
#   diffler config --dump

[ui]
# theme: "github-dark" (default), "github-light", or "dracula"
# theme = "github-dark"
# context_lines = 3
# recent_commits = 10
# File-list layout per view: "list" (flat magit-style, one row per file with
# its full path) or "tree" (collapsible directories). Status defaults to the
# flat list; the diff sidebar defaults to the tree. The diff sidebar also
# accepts "review": files split into "To review" and a folded "Viewed" bucket
# (GitHub-style; an edited file falls back into "To review"). `t` cycles the
# layouts live.
# status_file_layout = "list"
# diff_file_layout = "tree"
# Open the diff pane side-by-side (old left, new right); `|` toggles it live.
# side_by_side = false

[mcp]
# enabled = true
# port = 8417

[editor]
# Editor command; unset falls back to $DIFFLER_EDITOR, then $EDITOR.
# command = "nvim"

# Key remaps per screen: action name -> chord. Chords are single keys ("q",
# "V"), ctrl combos ("<c-r>"), specials ("<cr>", "<tab>"), or two-key
# sequences ("cc", "gg"). Unlisted actions keep their built-in binding;
# `?` in the TUI shows the effective keymap.

[keys.status]
# palette = "<c-k>"   # fuzzy command palette, bound on every screen
