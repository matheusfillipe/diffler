[graph]
all-features = true

[advisories]
version = 2
yanked = "deny"
ignore = [
  # unmaintained transitive deps of syntect; swap for two-face loaders in M1 if still flagged
  "RUSTSEC-2024-0320", # yaml-rust
  "RUSTSEC-2025-0141", # bincode 1.x
]

[licenses]
version = 2
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-3.0",
  "Zlib",
  "MPL-2.0",
  "CC0-1.0",
]

[bans]
multiple-versions = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
