[default]
# deliberate non-words that must stay verbatim: an RFC 4648 base64 test vector
# and a misspelled config key a test asserts the loader rejects
extend-ignore-re = [
  'base64\(b"fo"\)',
  '`ui\.thme`',
]

[default.extend-words]
ratatui = "ratatui"

[files]
extend-exclude = ["demos/*/uv.lock", "demos/*/bun.lock", "Cargo.lock", "Formula/*", "bucket/*", "packaging/*", "flake.nix"]
