name: Release
on:
  push:
    tags: ["v[0-9]+.[0-9]+.[0-9]+*"]
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  create-release:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Verify tag matches Cargo.toml version
        run: |
          ver=$(grep -m1 -E '^version = "' Cargo.toml | sed -E 's/^version = "([^"]+)"/\1/')
          [ "v$ver" = "$GITHUB_REF_NAME" ] || { echo "Cargo.toml $ver != tag $GITHUB_REF_NAME"; exit 1; }
      - env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" --draft --verify-tag --title "$GITHUB_REF_NAME"

  build:
    needs: create-release
    if: ${{ !failure() && !cancelled() }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: x86_64-unknown-linux-musl, os: ubuntu-latest }
          - { target: aarch64-unknown-linux-musl, os: ubuntu-24.04-arm }
          - { target: x86_64-apple-darwin, os: macos-latest }
          - { target: aarch64-apple-darwin, os: macos-latest }
          - { target: x86_64-pc-windows-msvc, os: windows-latest }
          - { target: aarch64-pc-windows-msvc, os: windows-11-arm }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install musl tools
        if: contains(matrix.target, 'musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - run: cargo build --release --locked --target ${{ matrix.target }} -p diffler
      - name: Package
        shell: bash
        run: |
          ref="${GITHUB_REF_NAME}"
          [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]] && ref="dry-run"
          name="diffler-${ref}-${{ matrix.target }}"
          mkdir "$name"
          cp README.md LICENSE-* "$name/"
          if [[ "${{ matrix.target }}" == *windows* ]]; then
            cp "target/${{ matrix.target }}/release/diffler.exe" "$name/"
            7z a "$name.zip" "$name"
            echo "ASSET=$name.zip" >> "$GITHUB_ENV"
          else
            cp "target/${{ matrix.target }}/release/diffler" "$name/"
            tar czf "$name.tar.gz" "$name"
            echo "ASSET=$name.tar.gz" >> "$GITHUB_ENV"
          fi
      - name: Upload artifact (dry run)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.target }}
          path: ${{ env.ASSET }}
      - name: Upload to release
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: gh release upload "$GITHUB_REF_NAME" "$ASSET" --clobber

  publish-release:
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - env:
          GH_TOKEN: ${{ github.token }}
        run: gh release edit "$GITHUB_REF_NAME" --draft=false --repo "$GITHUB_REPOSITORY"

  crates:
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: rust-lang/crates-io-auth-action@v1
        id: auth
      - env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        # the core library first, then the binary that depends on it
        run: |
          cargo publish -p diffler-core --locked
          cargo publish -p diffler --locked

  npm:
    needs: publish-release
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - run: npm install -g npm@latest
      - name: Verify package versions match the tag
        env:
          TAG: ${{ github.ref_name }}
        run: |
          for d in npm/diffler npm/diffler-mcp; do
            pkg=$(node -p "require('./$d/package.json').version")
            [ "v$pkg" = "$TAG" ] || { echo "$d: $pkg != tag $TAG"; exit 1; }
          done
      - env:
          NODE_AUTH_TOKEN: ""
        run: |
          (cd npm/diffler && npm publish)
          (cd npm/diffler-mcp && npm publish)

  package-managers:
    needs: publish-release
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main
      - name: Render brew + scoop + AUR from the release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          mkdir -p /tmp/assets
          gh release download "$TAG" --dir /tmp/assets --repo "$GITHUB_REPOSITORY"
          bash scripts/packaging.sh "${TAG#v}" /tmp/assets
      - uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      - name: Validate the Nix flake builds against the release assets
        run: nix build "path:$PWD#packages.x86_64-linux.default" -L
      - name: Commit brew + scoop + AUR manifests
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/diffler.rb bucket/diffler.json packaging/aur/PKGBUILD packaging/aur/.SRCINFO flake.nix
          git diff --cached --quiet || git commit -m "Update package manifests for ${{ github.ref_name }}"
          git push origin main
