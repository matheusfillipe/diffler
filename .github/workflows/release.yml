name: Release
on:
  push:
    tags: ["v[0-9]+.[0-9]+.[0-9]+*"]
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  # single job creates the draft release so concurrent matrix jobs don't race
  create-release:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" --draft --verify-tag --title "$GITHUB_REF_NAME"

  build:
    needs: create-release
    if: ${{ !failure() && !cancelled() }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: x86_64-unknown-linux-musl, os: ubuntu-latest }
          - { target: aarch64-unknown-linux-musl, os: ubuntu-24.04-arm }
          - { target: x86_64-apple-darwin, os: macos-latest }
          - { target: aarch64-apple-darwin, os: macos-latest }
          - { target: x86_64-pc-windows-msvc, os: windows-latest }
          - { target: aarch64-pc-windows-msvc, os: windows-11-arm }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install musl tools
        if: contains(matrix.target, 'musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - run: cargo build --release --locked --target ${{ matrix.target }} -p diffler
      - name: Package
        shell: bash
        run: |
          ref="${GITHUB_REF_NAME}"
          [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]] && ref="dry-run"
          name="diffler-${ref}-${{ matrix.target }}"
          mkdir "$name"
          cp README.md LICENSE-* "$name/"
          if [[ "${{ matrix.target }}" == *windows* ]]; then
            cp "target/${{ matrix.target }}/release/diffler.exe" "$name/"
            7z a "$name.zip" "$name"
            echo "ASSET=$name.zip" >> "$GITHUB_ENV"
          else
            cp "target/${{ matrix.target }}/release/diffler" "$name/"
            tar czf "$name.tar.gz" "$name"
            echo "ASSET=$name.tar.gz" >> "$GITHUB_ENV"
          fi
      - name: Upload artifact (dry run)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.target }}
          path: ${{ env.ASSET }}
      - name: Upload to release
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: gh release upload "$GITHUB_REF_NAME" "$ASSET" --clobber
