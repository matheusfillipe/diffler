name: Publish
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry_run:
        description: Validate packaging without publishing
        type: boolean
        default: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  crates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      # secrets cannot be referenced in `if:` expressions, so presence is
      # exported through a step output; missing secret degrades to a dry run
      # instead of failing (forks stay green)
      - name: Check registry token
        id: token
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: echo "present=$([ -n "$CARGO_REGISTRY_TOKEN" ] && echo true || echo false)" >> "$GITHUB_OUTPUT"
      - name: Decide mode
        id: mode
        env:
          TOKEN_PRESENT: ${{ steps.token.outputs.present }}
          IS_RELEASE: ${{ github.event_name == 'release' }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          publish=false
          if [ "$TOKEN_PRESENT" = true ] && { [ "$IS_RELEASE" = true ] || [ "$DRY_RUN" = false ]; }; then
            publish=true
          fi
          echo "publish=$publish" >> "$GITHUB_OUTPUT"
      # The first-ever publish of each crate must be done manually by a
      # maintainer (cargo login + cargo publish): the names need an owner
      # before this token-based job can update them. crates.io trusted
      # publishing (OIDC) can replace the token once the crates exist.
      - name: Publish to crates.io
        if: steps.mode.outputs.publish == 'true'
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          cargo publish -p diffler-core --locked
          cargo publish -p diffler --locked
      # Only diffler-core gets a dry run: `cargo publish --dry-run -p diffler`
      # verifies against the live registry, where diffler-core is not (yet)
      # published at this version, so it would always fail here.
      - name: Dry run
        if: steps.mode.outputs.publish != 'true'
        run: |
          cargo publish --dry-run -p diffler-core --locked
          echo "::notice::crates.io dry run only (dry_run input or missing CARGO_REGISTRY_TOKEN); nothing was published"

  npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - name: Check npm token
        id: token
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: echo "present=$([ -n "$NPM_TOKEN" ] && echo true || echo false)" >> "$GITHUB_OUTPUT"
      - name: Download release archives
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.release.tag_name }}
        run: |
          mkdir archives
          gh release download "$TAG" --dir archives
      - uses: dtolnay/rust-toolchain@stable
        if: github.event_name == 'workflow_dispatch'
      # Dry runs have no release assets, so the host binary stands in for the
      # musl release artifact under that target's archive name. This validates
      # the packaging script, not the binary itself.
      - name: Build host archive (dry run)
        if: github.event_name == 'workflow_dispatch'
        run: |
          cargo build --release --locked -p diffler
          mkdir archives staging
          cp target/release/diffler staging/
          tar czf archives/diffler-dry-run-x86_64-unknown-linux-musl.tar.gz -C staging diffler
      - name: Pack npm packages
        env:
          EVENT: ${{ github.event_name }}
          TAG: ${{ github.event.release.tag_name }}
        run: |
          if [ "$EVENT" = release ]; then
            version="${TAG#v}"
          else
            version=$(grep -m 1 '^version' Cargo.toml | cut -d '"' -f 2)
          fi
          bash scripts/npm-pack.sh "$version" archives
      # require.resolve needs the platform package inside node_modules; the
      # symlink stays out of the published tarball (files allowlists bin only)
      - name: Smoke test entry shim
        run: |
          mkdir -p npm/dist/diffler/node_modules/@mattfillipe
          ln -s ../../../@mattfillipe/diffler-linux-x64 npm/dist/diffler/node_modules/@mattfillipe/diffler-linux-x64
          node npm/dist/diffler/bin/diffler.js --version
      # npm publish only happens for a real release: a dry run packs a single
      # host platform, which must never reach the registry
      - name: Publish to npm
        if: github.event_name == 'release' && steps.token.outputs.present == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for pkg in npm/dist/@mattfillipe/diffler-* npm/dist/diffler; do
            npm publish "$pkg" --access public
          done
      - name: Pack tarballs (dry run)
        if: github.event_name != 'release' || steps.token.outputs.present != 'true'
        env:
          # the setup-node .npmrc references this var; npm errors on any
          # command while it is unset, so give the dry run an empty value
          NODE_AUTH_TOKEN: ""
        run: |
          mkdir tarballs
          for pkg in npm/dist/@mattfillipe/diffler-* npm/dist/diffler; do
            npm pack "$pkg" --pack-destination tarballs
          done
          echo "::notice::npm dry run only (dry_run input or missing NPM_TOKEN); nothing was published"
      - name: Upload tarballs (dry run)
        if: github.event_name != 'release' || steps.token.outputs.present != 'true'
        uses: actions/upload-artifact@v7
        with:
          name: npm-packages
          path: tarballs/
