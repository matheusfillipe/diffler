name: Publish
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry_run:
        description: Validate packaging without publishing
        type: boolean
        default: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  crates:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: rust-lang/crates-io-auth-action@v1
        id: auth
        if: github.event_name == 'release'
      - name: Publish to crates.io
        if: github.event_name == 'release'
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: |
          cargo publish -p diffler-core --locked
          cargo publish -p diffler --locked
      - name: Dry run
        if: github.event_name != 'release'
        run: |
          cargo publish --dry-run -p diffler-core --locked
          echo "::notice::crates.io dry run only (no release event); nothing was published"

  npm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: npm/diffler
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - run: npm install -g npm@latest
      - name: Verify package version matches the tag
        if: github.event_name == 'release'
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          pkg=$(node -p "require('./package.json').version")
          [ "v$pkg" = "$TAG" ] || { echo "package.json $pkg != tag $TAG"; exit 1; }
      - name: Publish (real on release via Trusted Publishing, else dry-run)
        env:
          NODE_AUTH_TOKEN: ""
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            npm publish
          else
            npm publish --dry-run
          fi
