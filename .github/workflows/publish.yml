name: Publish
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry_run:
        description: Validate packaging without publishing
        type: boolean
        default: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  # Publishes via crates.io Trusted Publishing (OIDC) — no token. The first
  # publish of each crate is manual (cargo login + cargo publish), to create
  # and own the name; configure the trusted publisher on crates.io afterwards
  # and CI updates them tokenlessly from then on.
  crates:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      # exchange the GitHub OIDC token for a short-lived crates.io token
      - uses: rust-lang/crates-io-auth-action@v1
        id: auth
        if: github.event_name == 'release'
      - name: Publish to crates.io
        if: github.event_name == 'release'
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: |
          cargo publish -p diffler-core --locked
          cargo publish -p diffler --locked
      # Only diffler-core gets a dry run: `cargo publish --dry-run -p diffler`
      # verifies against the live registry, where diffler-core is not (yet)
      # published at this version, so it would always fail here.
      - name: Dry run
        if: github.event_name != 'release'
        run: |
          cargo publish --dry-run -p diffler-core --locked
          echo "::notice::crates.io dry run only (no release event); nothing was published"

  # @mattfillipe/diffler is one package whose postinstall fetches the matching
  # binary from this release's assets, so publishing needs no archives and no
  # token — npm Trusted Publishing (OIDC), the same path as diffler-mcp. The
  # first publish of the package is manual (see docs); CI updates it after.
  npm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: npm/diffler
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      # Trusted Publishing needs npm >= 11.5.1; node 22 ships an older npm
      - run: npm install -g npm@latest
      - name: Set version
        env:
          EVENT: ${{ github.event_name }}
          TAG: ${{ github.event.release.tag_name }}
        run: |
          [ "$EVENT" = release ] && version="${TAG#v}" || version="0.0.0"
          npm version "$version" --no-git-tag-version --allow-same-version
      - name: Publish (real on release via Trusted Publishing, else dry-run)
        # setup-node's registry-url writes an .npmrc with a placeholder auth
        # token; blanking it forces npm to fall through to OIDC instead of
        # trying (and failing) token auth
        env:
          NODE_AUTH_TOKEN: ""
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            npm publish
          else
            npm publish --dry-run
          fi
