version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    ignore:
      # the MSRV job pins this toolchain to rust-version on purpose
      - dependency-name: dtolnay/rust-toolchain
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
    groups:
      deps:
        patterns: ["*"]
